kind = "web"
previewPath = "/"
title = "Engagement Party RSVP"
version = "1.0.0"
id = "artifacts/rsvp-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18119

[services.development]
run = "pnpm --filter @workspace/rsvp-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rsvp-site", "run", "build" ]
publicDir = "artifacts/rsvp-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18119"
BASE_PATH = "/"
