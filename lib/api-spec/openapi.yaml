openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Engagement Party RSVP API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: rsvp
    description: RSVP operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /rsvp:
    post:
      operationId: submitRsvp
      tags: [rsvp]
      summary: Submit RSVP
      description: Submit an RSVP response — appended to Google Sheets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RsvpInput"
      responses:
        "200":
          description: RSVP submitted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RsvpResult"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /rsvp/sheet-url:
    get:
      operationId: getSheetUrl
      tags: [rsvp]
      summary: Get Google Sheet URL
      description: Returns the URL of the Google Sheet where RSVPs are stored
      responses:
        "200":
          description: Sheet URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SheetUrlResult"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    RsvpInput:
      type: object
      required:
        - name
        - email
        - attending
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        attending:
          type: boolean
        guestCount:
          type: ["integer", "null"]
          minimum: 1
        dietaryRestrictions:
          type: ["string", "null"]
        message:
          type: ["string", "null"]
    RsvpResult:
      type: object
      required:
        - success
        - message
      properties:
        success:
          type: boolean
        message:
          type: string
    SheetUrlResult:
      type: object
      required:
        - url
      properties:
        url:
          type: string
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
